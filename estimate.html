<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 견적 | Well Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Malgun Gothic', sans-serif; }
        .sticky-summary { position: sticky; top: 5rem; }
        #pdf-template { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="text-xl font-black text-blue-600">COMPATCH</a>
            <div class="hidden md:flex gap-6 text-sm font-semibold text-gray-600">
                <a href="index.html">메인으로</a>
                <a href="estimate.html" class="text-blue-600">실시간 견적</a>
                <a href="trade-in.html">중고 매입</a>
                <a href="archive.html">자료실</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-10">
        <div class="flex flex-col lg:flex-row gap-8">
            <div class="flex-1 space-y-6" id="partsContainer">
                <div class="text-center py-20 text-gray-400">상품 정보를 불러오는 중입니다...</div>
            </div>

            <div class="w-full lg:w-96">
                <div class="sticky-summary bg-white p-6 rounded-3xl shadow-xl border border-gray-100">
                    <h2 class="text-xl font-black mb-6">견적 요약</h2>
                    <div id="selectedSummary" class="space-y-4 mb-8">
                        <p class="text-gray-400 text-sm text-center py-10">선택된 부품이 없습니다.</p>
                    </div>
                    <div class="pt-6 border-t border-gray-100">
                        <div class="flex justify-between items-end mb-6">
                            <span class="text-gray-500 font-bold">합계 금액</span>
                            <span id="totalDisplay" class="text-3xl font-black text-blue-600">0원</span>
                        </div>
                        <button onclick="openConsultModal()" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-black text-lg hover:bg-blue-600 transition-all">
                            상담 신청 및 PDF 받기
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="consultModal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[32px] p-8 shadow-2xl">
            <h2 class="text-2xl font-black mb-2">상담 신청하기</h2>
            <form id="consultForm" class="space-y-4">
                <input type="text" id="userName" placeholder="성함" required class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl outline-none">
                <input type="tel" id="userPhone" placeholder="연락처" required class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl outline-none">
                <textarea id="userMemo" placeholder="요청사항" rows="3" class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl outline-none resize-none"></textarea>
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black hover:bg-blue-700">신청 완료</button>
                <button type="button" onclick="closeConsultModal()" class="w-full text-gray-400 text-sm mt-2">닫기</button>
            </form>
        </div>
    </div>

    <div id="pdf-template">...</div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // 1. Firebase 초기화 (본인의 URL로 반드시 교체하세요)
        const firebaseConfig = { 
            databaseURL: "https://compatch-e7305-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedItems = {};

        // 2. 부품 데이터 로드 함수 (구조 보정)
        function loadParts() {
            db.ref('parts').on('value', (snapshot) => {
                const data = snapshot.val();
                const container = document.getElementById('partsContainer');
                
                if (!data) {
                    container.innerHTML = '<div class="text-center py-20 text-gray-400">등록된 상품 정보가 없습니다.</div>';
                    return;
                }

                let html = '';
                // 시리즈(인텔 울트라 시리즈 등) 별로 반복
                Object.keys(data).forEach(series => {
                    html += `
                        <div class="bg-white p-6 rounded-[32px] border border-gray-100 shadow-sm mb-6">
                            <h3 class="text-lg font-black mb-4 flex items-center gap-2">
                                <span class="w-2 h-6 bg-blue-600 rounded-full"></span> ${series}
                            </h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    `;

                    // 시리즈 내부의 각 부품들 반복
                    const partsInSeries = data[series];
                    Object.keys(partsInSeries).forEach(partKey => {
                        const part = partsInSeries[partKey];
                        // 파이썬에서 저장할 때 name과 lprice(또는 price)를 확인해야 함
                        const price = part.lprice ? parseInt(part.lprice) : (part.price ? parseInt(part.price) : 0);
                        const category = part.type || "기타"; 

                        html += `
                            <button onclick="selectPart('${category}', '${part.name.replace(/'/g, "\\'")}', ${price})" 
                                    class="flex justify-between items-center p-4 rounded-2xl border border-gray-50 hover:border-blue-500 hover:bg-blue-50 transition-all text-left group">
                                <div class="flex flex-col">
                                    <span class="text-[10px] font-bold text-gray-400 group-hover:text-blue-400">${category}</span>
                                    <span class="font-bold text-gray-700 text-sm line-clamp-1">${part.name}</span>
                                </div>
                                <span class="text-blue-600 font-bold whitespace-nowrap ml-2">${price.toLocaleString()}원</span>
                            </button>
                        `;
                    });

                    html += `</div></div>`;
                });
                container.innerHTML = html;
            });
        }

        // 3. 부품 선택 및 요약 업데이트
        function selectPart(category, name, price) {
            selectedItems[category] = { name, price };
            updateSummary();
        }

        function updateSummary() {
            const summary = document.getElementById('selectedSummary');
            const totalDisplay = document.getElementById('totalDisplay');
            let total = 0;
            
            let html = Object.entries(selectedItems).map(([cat, item]) => {
                total += item.price;
                return `
                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl">
                        <div class="overflow-hidden mr-2">
                            <p class="text-[10px] font-bold text-blue-500 uppercase">${cat}</p>
                            <p class="text-sm font-bold text-gray-800 truncate">${item.name}</p>
                        </div>
                        <span class="text-sm font-bold whitespace-nowrap">${item.price.toLocaleString()}원</span>
                    </div>
                `;
            }).join('');

            summary.innerHTML = html || '<p class="text-gray-400 text-sm text-center py-10">선택된 부품이 없습니다.</p>';
            totalDisplay.innerText = total.toLocaleString() + '원';
        }

        function openConsultModal() {
            if (Object.keys(selectedItems).length === 0) return alert("부품을 선택해주세요.");
            document.getElementById('consultModal').classList.remove('hidden');
            document.getElementById('consultModal').classList.add('flex');
        }

        function closeConsultModal() {
            document.getElementById('consultModal').classList.add('hidden');
        }

        // 초기화 실행
        window.onload = loadParts;
    </script>
</body>
</html>
