<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 견적 | Well Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Malgun Gothic', sans-serif; }
        .sticky-summary { position: sticky; top: 5rem; }
        /* PDF 템플릿: 평소에는 완전히 숨김 */
        #pdf-template { 
            display: none; 
            width: 190mm; 
            background: white; 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-start gap-10">
            <a href="index.html" class="text-xl font-black text-blue-600">Well Design</a>
            <div class="hidden md:flex gap-6 text-sm font-semibold text-gray-600">
                <a href="index.html" class="text-blue-600">메인으로</a>
                <a href="estimate.html" class="hover:text-blue-600">컴퓨터 견적내기</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-10">
        <div class="flex flex-col lg:flex-row gap-8">
            <div class="flex-1 space-y-6" id="partsContainer">
                <div class="text-center py-20 text-gray-400">상품 정보를 불러오는 중입니다...</div>
            </div>

            <div class="w-full lg:w-96">
                <div class="sticky-summary bg-white p-6 rounded-3xl shadow-xl border border-gray-100">
                    <h2 class="text-xl font-black mb-6">견적 요약</h2>
                    
                    <div class="mb-4 p-4 bg-blue-50 rounded-2xl border border-blue-100 flex items-center gap-3 cursor-pointer" onclick="toggleAssembly()">
                        <input type="checkbox" id="assemblyCheck" class="w-5 h-5 accent-blue-600" onchange="updateSummary()">
                        <div class="flex-1">
                            <p class="text-sm font-bold text-gray-800">조립 및 1년 출장 A/S</p>
                        </div>
                        <span class="text-sm font-black text-blue-600">100,000원</span>
                    </div>

                    <div id="selectedSummary" class="space-y-4 mb-8 max-h-[40vh] overflow-y-auto no-scrollbar">
                        <p class="text-gray-400 text-sm text-center py-10">선택된 부품이 없습니다.</p>
                    </div>

                    <div class="pt-6 border-t border-gray-100">
                        <div class="flex justify-between items-end mb-6">
                            <span class="text-gray-500 font-bold">합계 금액</span>
                            <span id="totalDisplay" class="text-3xl font-black text-blue-600">0원</span>
                        </div>
                        <button onclick="openConsultModal()" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-black text-lg hover:bg-blue-600 transition-all">
                            상담 신청 및 PDF 받기
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="consultModal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[32px] p-8 shadow-2xl">
            <h2 class="text-2xl font-black mb-4">상담 신청</h2>
            <form id="consultForm" class="space-y-4">
                <input type="text" id="userName" placeholder="성함" required class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl outline-none">
                <input type="tel" id="userPhone" placeholder="연락처" required class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl outline-none">
                <textarea id="userMemo" placeholder="요구사항" rows="3" class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl outline-none"></textarea>
                <div class="flex gap-2">
                    <button type="button" onclick="closeConsultModal()" class="flex-1 py-4 font-bold text-gray-400">닫기</button>
                    <button type="submit" class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-black">신청 완료</button>
                </div>
            </form>
        </div>
    </div>

    <div id="pdf-template" style="padding: 40px; color: #1a1a1a;">
        <div style="border-bottom: 4px solid #2563eb; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end;">
            <h1 style="font-size: 28px; font-weight: 900; margin: 0;">PC 조립 견적서</h1>
            <span id="pdf-date" style="font-size: 12px; color: #666;"></span>
        </div>
        <div style="margin-bottom: 30px;">
            <p style="margin: 5px 0;"><strong>고객명:</strong> <span id="pdf-name"></span></p>
            <p style="margin: 5px 0;"><strong>연락처:</strong> <span id="pdf-phone"></span></p>
        </div>
        <table style="width: 100%; border-collapse: collapse; margin-bottom: 30px;">
            <thead>
                <tr style="background-color: #f8fafc; border-top: 2px solid #333;">
                    <th style="padding: 12px; border-bottom: 1px solid #eee; text-align: left;">구분</th>
                    <th style="padding: 12px; border-bottom: 1px solid #eee; text-align: left;">제품명</th>
                    <th style="padding: 12px; border-bottom: 1px solid #eee; text-align: center;">수량</th>
                    <th style="padding: 12px; border-bottom: 1px solid #eee; text-align: right;">소계</th>
                </tr>
            </thead>
            <tbody id="pdf-items"></tbody>
        </table>
        <div style="background: #f8fafc; padding: 20px; border-radius: 10px; text-align: right;">
            <span style="font-size: 16px; color: #666; margin-right: 20px;">최종 합계</span>
            <span id="pdf-total" style="font-size: 24px; font-weight: 900; color: #2563eb;"></span>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://compatch-e7305-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedItems = {};
        const ASSEMBLY_FEE = 100000;

        // 부품 로드 및 선택 로직 (기존 유지)
        function loadParts() {
            const container = document.getElementById('partsContainer');
            db.ref('parts_db').on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) return;
                const categories = ["CPU", "쿨러", "메인보드", "메모리", "그래픽카드", "SSD/HDD", "케이스", "파워", "모니터"];
                const allItems = Object.entries(data);
                container.innerHTML = categories.map(cat => {
                    const catParts = allItems.filter(([key, item]) => item.category === cat);
                    if (catParts.length === 0) return '';
                    return `
                        <div class="mb-10">
                            <h3 class="text-sm font-black mb-4 text-gray-500 uppercase tracking-wider">${cat}</h3>
                            <div class="space-y-2">
                                ${catParts.map(([key, item]) => `
                                    <div onclick="selectPart('${cat}', '${item.name}', ${item.price})" class="flex items-center gap-6 bg-white px-6 py-5 rounded-2xl border border-gray-100 hover:border-blue-500 cursor-pointer">
                                        <div class="flex-1">
                                            <h4 class="font-bold text-gray-800">${item.name}</h4>
                                        </div>
                                        <p class="font-black text-lg">${Number(item.price).toLocaleString()}원</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }).join('');
            });
        }

        function selectPart(category, name, price) {
            selectedItems[category] = { name, price, count: 1 };
            updateSummary();
        }

        function updateCount(category, change) {
            if (!selectedItems[category]) return;
            selectedItems[category].count += change;
            if (selectedItems[category].count <= 0) delete selectedItems[category];
            updateSummary();
        }

        function toggleAssembly() {
            const check = document.getElementById('assemblyCheck');
            check.checked = !check.checked;
            updateSummary();
        }

        function updateSummary() {
            const summary = document.getElementById('selectedSummary');
            const totalDisplay = document.getElementById('totalDisplay');
            const isAssemblyChecked = document.getElementById('assemblyCheck').checked;
            let total = isAssemblyChecked ? ASSEMBLY_FEE : 0;
            
            summary.innerHTML = Object.entries(selectedItems).map(([cat, item]) => {
                total += (item.price * item.count);
                return `<div class="bg-gray-50 p-4 rounded-2xl flex justify-between">
                    <span class="text-sm font-bold">${item.name}</span>
                    <button onclick="updateCount('${cat}', -1)">✕</button>
                </div>`;
            }).join('') || '<p class="text-center py-10 text-gray-400">선택된 부품이 없습니다.</p>';
            
            totalDisplay.innerText = total.toLocaleString() + '원';
        }

        // [해결포인트] PDF 생성 로직
        async function generatePDF(data) {
            const element = document.getElementById('pdf-template');
            
            // 1. PDF 데이터 채우기
            document.getElementById('pdf-name').innerText = data.name;
            document.getElementById('pdf-phone').innerText = data.phone;
            document.getElementById('pdf-date').innerText = "발행일: " + new Date().toLocaleDateString();
            document.getElementById('pdf-total').innerText = data.totalPrice;

            const isAssemblyChecked = document.getElementById('assemblyCheck').checked;
            let rows = Object.entries(data.items).map(([cat, item]) => `
                <tr>
                    <td style="padding: 12px; border-bottom: 1px solid #eee;">${cat}</td>
                    <td style="padding: 12px; border-bottom: 1px solid #eee; font-weight: bold;">${item.name}</td>
                    <td style="padding: 12px; border-bottom: 1px solid #eee; text-align: center;">${item.count}</td>
                    <td style="padding: 12px; border-bottom: 1px solid #eee; text-align: right;">${(item.price * item.count).toLocaleString()}원</td>
                </tr>
            `).join('');

            if (isAssemblyChecked) {
                rows += `<tr style="background-color: #f0f7ff;">
                    <td>Service</td><td>조립 및 1년 출장 A/S</td><td style="text-align:center;">1</td><td style="text-align:right;">100,000원</td>
                </tr>`;
            }
            document.getElementById('pdf-items').innerHTML = rows;

            // 2. [핵심] 숨겨진 요소를 렌더링 가능하게 일시적으로 설정
            element.style.display = 'block';
            element.style.position = 'fixed';
            element.style.left = '-9999px'; // 화면 밖으로 밀어내어 사용자에게 안 보이게 함

            const opt = {
                margin: 10,
                filename: `견적서_${data.name}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // 3. PDF 저장 후 다시 숨김
            try {
                await html2pdf().set(opt).from(element).save();
            } finally {
                element.style.display = 'none';
            }
        }

        document.getElementById('consultForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const requestData = {
                name: document.getElementById('userName').value,
                phone: document.getElementById('userPhone').value,
                items: selectedItems,
                totalPrice: document.getElementById('totalDisplay').innerText,
                timestamp: Date.now()
            };

            db.ref('requests').push(requestData, async (error) => {
                if (!error) {
                    await generatePDF(requestData);
                    alert('신청 완료! PDF가 다운로드됩니다.');
                    location.reload();
                }
            });
        });

        function openConsultModal() {
            if (Object.keys(selectedItems).length === 0) return alert("부품을 선택해주세요.");
            document.getElementById('consultModal').classList.remove('hidden');
            document.getElementById('consultModal').classList.add('flex');
        }

        function closeConsultModal() {
            document.getElementById('consultModal').classList.add('hidden');
        }

        window.onload = loadParts;
    </script>
</body>
</html>
