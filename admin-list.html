<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 모드 | Compatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100">

    <div id="loginSection" class="fixed inset-0 bg-gray-900 flex items-center justify-center z-[200]">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-black mb-6">관리자 인증</h2>
            <input type="password" id="adminPassword" placeholder="암호를 입력하세요" 
                   class="w-full px-4 py-3 border rounded-xl mb-4 text-center outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="checkPassword()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700">로그인</button>
        </div>
    </div>

    <div id="adminMain" class="hidden">
        <nav class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50">
            <h1 class="text-xl font-black text-blue-600">COMPATCH ADMIN</h1>
            <button onclick="logout()" class="text-sm font-bold text-red-500 bg-red-50 px-4 py-2 rounded-lg hover:bg-red-100">로그아웃</button>
        </nav>

        <main class="max-w-7xl mx-auto p-6">
            <h2 class="text-2xl font-bold mb-6">견적 상담 신청 내역</h2>
            <div id="requestList" class="grid gap-6">
                </div>
        </main>
    </div>

    <script>
        // Firebase 설정 (기존 설정과 동일하게 유지)
        const firebaseConfig = {
            authDomain: "compatch-e7305.firebaseapp.com",
            databaseURL: "https://compatch-e7305-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "compatch-e7305"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. 로그인 로직
        function checkPassword() {
            const pw = document.getElementById('adminPassword').value;
            if (pw === "0927") {
                sessionStorage.setItem("adminLoggedIn", "true"); // 세션에 로그인 상태 저장
                showAdminPage();
            } else {
                alert("암호가 틀렸습니다.");
            }
        }

        function showAdminPage() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('adminMain').classList.remove('hidden');
            loadRequests();
        }

        function logout() {
            sessionStorage.removeItem("adminLoggedIn");
            location.reload(); // 새로고침하여 로그인 화면으로 이동
        }

        // 페이지 로드 시 로그인 상태 확인
        window.onload = function() {
            if (sessionStorage.getItem("adminLoggedIn") === "true") {
                showAdminPage();
            }
        };

        // 2. 데이터 로드 로직 (물품 정보 포함)
        function loadRequests() {
            const listContainer = document.getElementById('requestList');
            
            db.ref('requests').orderByChild('timestamp').on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    listContainer.innerHTML = '<p class="text-gray-400">신청 내역이 없습니다.</p>';
                    return;
                }

                const html = Object.keys(data).reverse().map(key => {
                    const req = data[key];
                    // 물품 리스트를 HTML 문자열로 생성
                    const itemsHtml = req.items ? req.items.map(item => `
                        <div class="flex justify-between text-xs border-b border-gray-50 py-2">
                            <span class="text-gray-600">${item.name} (${item.quantity}개)</span>
                            <span class="font-bold">${(item.price * item.quantity).toLocaleString()}원</span>
                        </div>
                    `).join('') : '<p class="text-red-400 text-xs">물품 정보 없음</p>';

                    return `
                        <div class="bg-white rounded-2xl shadow-sm border p-6 flex flex-col md:flex-row gap-6">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-2">
                                    <span class="px-2 py-1 bg-blue-100 text-blue-600 text-[10px] font-bold rounded">${new Date(req.timestamp).toLocaleString()}</span>
                                    <h3 class="font-black text-lg">${req.name} <span class="text-sm font-normal text-gray-500">(${req.phone})</span></h3>
                                </div>
                                <p class="text-gray-600 text-sm mb-4">${req.memo || '메모 없음'}</p>
                                <div class="bg-gray-50 p-4 rounded-xl">
                                    <p class="text-xs font-bold text-gray-400 mb-2 uppercase tracking-wider">신청 물품 리스트</p>
                                    ${itemsHtml}
                                </div>
                            </div>
                            <div class="w-full md:w-48 flex flex-col justify-center items-end border-t md:border-t-0 md:border-l pt-4 md:pt-0 md:pl-6">
                                <p class="text-gray-400 text-xs mb-1">최종 견적가</p>
                                <p class="text-xl font-black text-blue-600">${req.totalPrice}</p>
                                <button onclick="deleteRequest('${key}')" class="mt-4 text-xs text-red-400 hover:text-red-600 underline">내역 삭제</button>
                            </div>
                        </div>
                    `;
                }).join('');

                listContainer.innerHTML = html;
            });
        }

        function deleteRequest(key) {
            if(confirm('이 내역을 삭제하시겠습니까?')) {
                db.ref('requests').child(key).remove();
            }
        }
    </script>
</body>
</html>
