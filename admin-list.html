<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 모드 | Compatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="sticky top-0 z-50 bg-white border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <a href="index.html" class="text-2xl font-black text-blue-600 tracking-tighter">COMPATCH</a>
                <div class="hidden md:flex gap-6 text-sm font-semibold text-gray-600">
                    <a href="index.html" class="hover:text-blue-600">메인으로</a>
                    <a href="estimate.html" class="hover:text-blue-600">실시간 견적</a>
                    <a href="trade-in.html" class="hover:text-blue-600">중고 매입</a>
                    <a href="archive.html" class="hover:text-blue-600">자료실</a>
                    <a href="admin-list.html" class="text-blue-600">관리자</a>
                </div>
            </div>
            <button onclick="logout()" id="logoutBtn" class="hidden text-sm font-bold text-red-500 bg-red-50 px-4 py-2 rounded-lg hover:bg-red-100">로그아웃</button>
        </div>
    </nav>

    <main class="min-h-screen">
        
        <div id="loginSection" class="max-w-7xl mx-auto px-4 py-20 flex justify-center">
            <div class="bg-white p-10 rounded-3xl shadow-xl border border-gray-100 w-full max-w-md text-center">
                <div class="text-4xl mb-4">🔐</div>
                <h2 class="text-2xl font-black mb-2">관리자 인증</h2>
                <p class="text-gray-400 text-sm mb-8">내역 확인을 위해 암호를 입력하세요.</p>
                <input type="password" id="adminPassword" placeholder="암호 입력" 
                       class="w-full px-4 py-4 border border-gray-200 rounded-2xl mb-4 text-center text-xl font-bold outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <button onclick="checkPassword()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg hover:bg-blue-700 transition shadow-lg shadow-blue-200">인증하기</button>
            </div>
        </div>

        <div id="adminMain" class="hidden max-w-7xl mx-auto px-4 py-10">
            
            <section class="mb-20">
                <div class="flex justify-between items-end mb-8">
                    <h2 class="text-3xl font-black">견적 상담 관리</h2>
                    <span class="text-sm font-bold text-blue-600 bg-blue-50 px-4 py-2 rounded-full" id="totalCount">접수 0건</span>
                </div>
                <div id="requestList" class="grid gap-6">
                    <div class="py-10 text-center text-gray-400">내역을 불러오는 중...</div>
                </div>
            </section>

            <section class="border-t pt-20">
                <h2 class="text-3xl font-black mb-8">자료실 파일 관리</h2>
                <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm mb-10">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <select id="arcCat" class="border p-4 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="드라이버">드라이버</option>
                            <option value="매뉴얼">매뉴얼</option>
                            <option value="BIOS">BIOS</option>
                        </select>
                        <input type="text" id="arcTitle" placeholder="자료 제목" class="md:col-span-1 border p-4 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-blue-500">
                        <input type="text" id="arcLink" placeholder="다운로드 URL (구글드라이브 등)" class="md:col-span-1 border p-4 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-blue-500">
                        <button onclick="uploadArchive()" class="bg-gray-900 text-white py-4 rounded-2xl font-black hover:bg-blue-600 transition">자료 등록</button>
                    </div>
                </div>
                
                <div id="archiveAdminList" class="space-y-4">
                    </div>
            </section>
        </div>

    </main>

    <script>
        // Firebase 설정
        const firebaseConfig = {
            databaseURL: "https://compatch-e7305-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // [인증 로직]
        function checkPassword() {
            if (document.getElementById('adminPassword').value === "0927") {
                sessionStorage.setItem("adminLoggedIn", "true");
                showAdminPage();
            } else {
                alert("암호가 틀렸습니다.");
            }
        }

        function showAdminPage() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('adminMain').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            loadRequests();
            loadArchiveAdmin();
        }

        function logout() {
            sessionStorage.removeItem("adminLoggedIn");
            location.reload();
        }

        window.onload = () => {
            if (sessionStorage.getItem("adminLoggedIn") === "true") showAdminPage();
        };

        // [견적 내역 로드]
        function loadRequests() {
            db.ref('requests').on('value', (snapshot) => {
                const data = snapshot.val();
                const list = document.getElementById('requestList');
                if (!data) { list.innerHTML = '<p class="text-gray-400 text-center">신청 내역 없음</p>'; return; }

                const keys = Object.keys(data).reverse();
                document.getElementById('totalCount').innerText = `접수 ${keys.length}건`;

                list.innerHTML = keys.map(key => {
                    const req = data[key];
                    const itemsHtml = req.items ? req.items.map(i => `
                        <div class="flex justify-between text-xs py-1 border-b border-gray-50 last:border-0">
                            <span class="text-gray-600">${i.name} (${i.quantity}개)</span>
                            <span class="font-bold">${(i.price * i.quantity).toLocaleString()}원</span>
                        </div>
                    `).join('') : '부품 정보 없음';

                    return `
                        <div class="bg-white rounded-3xl border border-gray-100 p-6 flex flex-col lg:flex-row gap-6 shadow-sm">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-4">
                                    <span class="text-[10px] bg-blue-100 text-blue-600 px-2 py-1 rounded font-bold">${new Date(req.timestamp).toLocaleString()}</span>
                                    <h3 class="font-black text-lg">${req.name} (${req.phone})</h3>
                                </div>
                                <div class="bg-gray-50 p-4 rounded-2xl mb-4 text-sm">${req.memo || '메모 없음'}</div>
                                <div class="bg-blue-50/30 p-4 rounded-2xl border border-blue-50">${itemsHtml}</div>
                            </div>
                            <div class="lg:w-48 flex flex-col justify-center items-end border-t lg:border-t-0 lg:border-l lg:pl-6 pt-4 lg:pt-0">
                                <p class="text-xs text-gray-400 mb-1">최종 견적가</p>
                                <p class="text-xl font-black text-blue-600 mb-4">${req.totalPrice}</p>
                                <button onclick="deleteData('requests', '${key}')" class="text-xs text-red-400 underline">내역 삭제</button>
                            </div>
                        </div>
                    `;
                }).join('');
            });
        }

        // [자료실 관리 로직]
        function uploadArchive() {
            const category = document.getElementById('arcCat').value;
            const title = document.getElementById('arcTitle').value;
            const link = document.getElementById('arcLink').value;
            if(!title || !link) return alert("내용을 입력하세요.");

            db.ref('archives').push({ category, title, link, date: new Date().toISOString().split('T')[0] })
              .then(() => { alert("등록 완료"); document.getElementById('arcTitle').value=''; document.getElementById('arcLink').value=''; });
        }

        function loadArchiveAdmin() {
            db.ref('archives').on('value', (snapshot) => {
                const data = snapshot.val();
                const list = document.getElementById('archiveAdminList');
                if(!data) { list.innerHTML = ''; return; }

                list.innerHTML = Object.keys(data).reverse().map(key => `
                    <div class="flex justify-between items-center bg-white p-4 rounded-2xl border border-gray-100">
                        <div class="flex items-center gap-4">
                            <span class="text-[10px] font-bold px-2 py-1 bg-gray-100 rounded">${data[key].category}</span>
                            <span class="text-sm font-bold">${data[key].title}</span>
                        </div>
                        <button onclick="deleteData('archives', '${key}')" class="text-xs text-red-400 hover:underline">삭제</button>
                    </div>
                `).join('');
            });
        }

        function deleteData(node, key) {
            if(confirm('삭제하시겠습니까?')) db.ref(node).child(key).remove();
        }
    </script>
</body>
</html>
