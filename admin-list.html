<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>통합 관리자 모드 | Well Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Malgun Gothic', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { color: #2563eb; border-bottom: 2px solid #2563eb; font-weight: 900; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

<nav class="sticky top-0 z-50 bg-white border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
        <a href="index.html" class="text-2xl font-black text-blue-600 tracking-tighter">Well Design Admin</a>
        <button onclick="logout()" class="text-sm font-bold text-gray-400 hover:text-red-500 transition-colors">로그아웃</button>
    </div>
    <div class="max-w-7xl mx-auto px-4 flex gap-8 border-t border-gray-50 overflow-x-auto no-scrollbar">
        <button onclick="switchTab('requests')" id="tab-requests" class="py-4 text-sm font-bold text-gray-400 whitespace-nowrap tab-active">견적/판매 신청 내역</button>
        <button onclick="switchTab('archive')" id="tab-archive" class="py-4 text-sm font-bold text-gray-400 whitespace-nowrap">자료실 관리</button>
        <button onclick="switchTab('used')" id="tab-used" class="py-4 text-sm font-bold text-gray-400 whitespace-nowrap">중고 제품 DB</button>
        <button onclick="switchTab('parts')" id="tab-parts" class="py-4 text-sm font-bold text-gray-400 whitespace-nowrap">견적 부품 DB</button>
    </div>
</nav>

<main class="max-w-5xl mx-auto px-4 py-12">
    
    <section id="sec-requests" class="tab-content">
        <h2 class="text-2xl font-black mb-6">고객 신청 내역</h2>
        <div id="requestList" class="space-y-4"></div>
    </section>

    <section id="sec-archive" class="tab-content hidden">
        <h2 class="text-2xl font-black mb-6">자료실 관리</h2>
        <div class="bg-white p-6 rounded-[24px] border border-gray-100 mb-8 text-center text-gray-400">데이터를 불러오는 중입니다...</div>
    </section>

    <section id="sec-used" class="tab-content hidden">
        <h2 class="text-2xl font-black mb-6">중고 제품 DB 관리</h2>
        <div id="usedProductList" class="space-y-4 text-center text-gray-400">데이터를 불러오는 중입니다...</div>
    </section>

    <section id="sec-parts" class="tab-content hidden">
        <h2 class="text-2xl font-black mb-6">견적 부품 DB 관리</h2>
        
        <div class="bg-white rounded-[32px] p-8 shadow-sm border border-gray-100 mb-10">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2 ml-1">카테고리</label>
                    <select id="partCategory" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500 font-bold">
                        <option>CPU</option><option>메인보드</option><option>메모리</option><option>그래픽카드</option>
                        <option>SSD/HDD</option><option>케이스</option><option>파워</option><option>쿨러</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2 ml-1">부품명</label>
                    <input type="text" id="partName" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500 font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2 ml-1">판매 가격 (숫자만)</label>
                    <input type="number" id="partPrice" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500 font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2 ml-1">이미지 URL</label>
                    <input type="text" id="partImage" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500 font-bold" placeholder="https://...">
                </div>
                
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-gray-400 mb-2 ml-1">상세 사양 및 설명</label>
                    <textarea id="partDesc" rows="8" class="w-full bg-gray-50 border-none rounded-3xl px-6 py-5 focus:ring-2 focus:ring-blue-500 font-medium resize-none leading-relaxed" placeholder="상세 스펙을 입력하세요."></textarea>
                </div>
            </div>
            
            <div class="mt-8 flex flex-col gap-3">
                <button id="submitBtn" onclick="savePartItem()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black hover:bg-blue-700 transition-all shadow-lg">
                    부품 데이터 등록
                </button>
                <button id="cancelBtn" onclick="resetPartForm()" class="hidden w-full bg-gray-100 text-gray-500 py-3 rounded-2xl font-bold">수정 취소</button>
            </div>
        </div>

        <div id="adminPartsList" class="grid grid-cols-1 gap-4"></div>
    </section>
</main>

<script>
    // Firebase 설정
         const firebaseConfig = { databaseURL: "https://compatch-e7305-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();


    let editingPartKey = null;

    // 탭 전환
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
        document.getElementById('sec-' + tabId).classList.remove('hidden');
        document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('tab-active'));
        document.getElementById('tab-' + tabId).classList.add('tab-active');
    }

    // 저장이 안되는 문제 해결 로직
    function savePartItem() {
        const category = document.getElementById('partCategory').value;
        const name = document.getElementById('partName').value;
        const price = parseInt(document.getElementById('partPrice').value);
        const image = document.getElementById('partImage').value || "https://via.placeholder.com/150";
        const description = document.getElementById('partDesc').value;

        if(!name || isNaN(price)) {
            alert("부품명과 가격을 정확히 입력해주세요.");
            return;
        }

        const partData = {
            category,
            name,
            price,
            image,
            description,
            timestamp: Date.now()
        };

        if (editingPartKey) {
            // 수정 모드: update 사용
            db.ref('parts_db').child(editingPartKey).update(partData)
                .then(() => {
                    alert("정보가 수정되었습니다.");
                    resetPartForm();
                })
                .catch(err => alert("수정 중 오류 발생: " + err));
        } else {
            // 등록 모드: push 사용
            db.ref('parts_db').push(partData)
                .then(() => {
                    alert("새 부품이 등록되었습니다.");
                    resetPartForm();
                })
                .catch(err => alert("등록 중 오류 발생: " + err));
        }
    }

    function editPart(key, json) {
        const item = JSON.parse(decodeURIComponent(json));
        editingPartKey = key;

        document.getElementById('partCategory').value = item.category;
        document.getElementById('partName').value = item.name;
        document.getElementById('partPrice').value = item.price;
        document.getElementById('partImage').value = item.image || "";
        document.getElementById('partDesc').value = item.description || item.desc || "";

        const btn = document.getElementById('submitBtn');
        btn.innerText = "부품 정보 수정 완료";
        btn.className = "w-full bg-green-600 text-white py-4 rounded-2xl font-black shadow-lg";
        document.getElementById('cancelBtn').classList.remove('hidden');
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function resetPartForm() {
        editingPartKey = null;
        document.getElementById('partName').value = "";
        document.getElementById('partPrice').value = "";
        document.getElementById('partImage').value = "";
        document.getElementById('partDesc').value = "";
        
        const btn = document.getElementById('submitBtn');
        btn.innerText = "부품 데이터 등록";
        btn.className = "w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg";
        document.getElementById('cancelBtn').classList.add('hidden');
    }

    function loadPartsAdmin() {
        db.ref('parts_db').on('value', snap => {
            const data = snap.val();
            const container = document.getElementById('adminPartsList');
            if(!data) {
                container.innerHTML = `<p class="text-center py-20 text-gray-400">등록된 부품이 없습니다.</p>`;
                return;
            }
            
            container.innerHTML = Object.entries(data).reverse().map(([key, item]) => {
                const json = encodeURIComponent(JSON.stringify(item));
                return `
                    <div class="bg-white p-6 rounded-[32px] border border-gray-100 shadow-sm">
                        <div class="flex items-start justify-between mb-4">
                            <div class="flex gap-4">
                                <img src="${item.image}" class="w-16 h-16 rounded-2xl object-cover bg-gray-50">
                                <div>
                                    <span class="text-[10px] font-black px-2 py-0.5 bg-blue-50 text-blue-600 rounded-full uppercase">${item.category}</span>
                                    <h4 class="font-bold text-gray-900 text-lg mt-1">${item.name}</h4>
                                    <p class="text-blue-600 font-black">${Number(item.price).toLocaleString()}원</p>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="editPart('${key}', '${json}')" class="px-4 py-2 bg-gray-100 text-gray-600 rounded-xl text-xs font-bold hover:bg-blue-600 hover:text-white transition-all">수정</button>
                                <button onclick="if(confirm('삭제할까요?')) db.ref('parts_db').child('${key}').remove()" class="px-4 py-2 bg-gray-100 text-red-400 rounded-xl text-xs font-bold hover:bg-red-500 hover:text-white transition-all">삭제</button>
                            </div>
                        </div>
                        <div class="bg-gray-50 rounded-2xl p-4">
                            <p class="text-sm text-gray-600 leading-relaxed whitespace-pre-wrap">${item.description || item.desc || '설명 없음'}</p>
                        </div>
                    </div>
                `;
            }).join('');
        });
    }

    // 초기 로드 시 암호 확인 로직 (기존 0927 유지)
    window.onload = () => {
        if(sessionStorage.getItem("adminLoggedIn") !== "true") {
            const pw = prompt("관리자 암호를 입력하세요.");
            if(pw === "0927") {
                sessionStorage.setItem("adminLoggedIn", "true");
                loadPartsAdmin();
            } else { location.href="index.html"; }
        } else {
            loadPartsAdmin();
        }
    };
</script>
</body>
</html>
