<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자료실 | Compatch</title>
    <script src="https://cdn.tailwindcss.com">

const db = firebase.database();
const archiveBody = document.querySelector('tbody');

db.ref('archives').on('value', (snapshot) => {
    const data = snapshot.val();
    if (!data) {
        archiveBody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-gray-400">등록된 자료가 없습니다.</td></tr>';
        return;
    }

    const html = Object.keys(data).reverse().map(key => {
        const item = data[key];
        const colorClass = item.category === '드라이버' ? 'bg-blue-50 text-blue-600' : 'bg-orange-50 text-orange-600';
        
        return `
            <tr class="hover:bg-gray-50 transition">
                <td class="p-4"><span class="${colorClass} px-3 py-1 rounded-full text-xs font-bold">${item.category}</span></td>
                <td class="p-4 font-semibold text-gray-800">${item.title}</td>
                <td class="p-4 text-sm text-gray-400 text-center">${item.date}</td>
                <td class="p-4 text-right"><a href="${item.link}" target="_blank" class="text-blue-600 font-bold hover:underline">⬇️ 다운로드</a></td>
            </tr>
        `;
    }).join('');

    archiveBody.innerHTML = html;
});

</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <a href="index.html" class="text-2xl font-black text-blue-600 tracking-tighter">COMPATCH</a>
                <div class="hidden md:flex gap-6 text-sm font-semibold text-gray-600">
                    <a href="index.html" class="hover:text-blue-600">메인으로</a>
                    <a href="estimate.html" class="hover:text-blue-600">실시간 견적</a>
                    <a href="trade-in.html" class="hover:text-blue-600">중고 매입</a>
                    <a href="archive.html" class="text-blue-600 font-bold">자료실</a>
                    <a href="admin-list.html" class="hover:text-blue-600">관리자</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="bg-slate-900 py-16 px-4 text-center">
        <h1 class="text-3xl md:text-4xl font-black text-white mb-4">고객지원 자료실</h1>
        <p class="text-slate-400">최신 드라이버 및 제품 매뉴얼을 빠르고 안전하게 다운로드하세요.</p>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <div class="flex flex-col md:flex-row gap-4 mb-8">

                <button class="whitespace-nowrap px-6 py-3 bg-white border border-gray-200 rounded-xl font-medium hover:bg-gray-50">BIOS</button>

    <footer class="bg-gray-100 py-10 text-center text-xs text-gray-400">
