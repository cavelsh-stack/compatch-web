        <p class="text-slate-400">최신 드라이버 및 제품 매뉴얼을 빠르고 안전하게 다운로드하세요.</p>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <div class="flex flex-col md:flex-row gap-4 mb-8">
            <div class="flex-1 relative">
                <input type="text" placeholder="모델명 또는 소프트웨어 검색..." class="w-full pl-12 pr-4 py-3 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">

                <button class="whitespace-nowrap px-6 py-3 bg-blue-600 text-white rounded-xl font-bold">전체</button>

                <button class="whitespace-nowrap px-6 py-3 bg-white border border-gray-200 rounded-xl font-medium hover:bg-gray-50">매뉴얼</button>

        </div>

        <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="p-4 text-sm font-bold text-gray-500">카테고리</th>

                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-4"><span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-bold">드라이버</span></td>
                        <td class="p-4 font-semibold text-gray-800">NVIDIA GeForce Game Ready Driver (v552.12)</td>
                        <td class="p-4 text-sm text-gray-400 text-center">2026-04-10</td>
