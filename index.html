<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compatch | 실시간 PC 견적 및 중고 매입</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* 커스텀 애니메이션 정의 */
        @keyframes fadeLoop {
            0%, 100% { opacity: 0; transform: scale(1); } /* 시작과 끝은 투명 */
            10%, 30% { opacity: 0.7; transform: scale(1.05); } /* 나타나서 유지 (약간 확대) */
            40% { opacity: 0; transform: scale(1.1); } /* 서서히 사라짐 */
        }

        .animate-fade-loop {
            animation: fadeLoop 12s infinite; /* 12초 주기로 무한 반복 */
            opacity: 0; /* 초기 상태 투명 */
        }

        /* 각 이미지별 지연 시간 설정 (겹치는 효과) */
        .delay-cpu { animation-delay: 0s; }
        .delay-ram { animation-delay: 4s; } /* CPU가 사라질 즈음 나타남 */
        .delay-ssd { animation-delay: 8s; } /* RAM이 사라질 즈음 나타남 */
    </style>
</head>
<body class="bg-gray-50 text-gray-900 overflow-x-hidden">

    <nav class="sticky top-0 z-50 bg-white border-b border-gray-100">
        </nav>

    <header class="relative bg-white pt-20 pb-32 overflow-hidden min-h-[80vh] flex items-center">
        
        <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
            <img src="https://images.unsplash.com/photo-1591799264318-7e698ddb7c1d?q=80&w=1000&auto=format&fit=crop" 
                 alt="CPU 배경" 
                 class="absolute w-full h-full object-cover animate-fade-loop delay-cpu filter blur-sm opacity-0">
            
            <img src="https://images.unsplash.com/photo-1562976540-1502c2145186?q=80&w=1000&auto=format&fit=crop" 
                 alt="RAM 배경" 
                 class="absolute w-full h-full object-cover animate-fade-loop delay-ram filter blur-sm opacity-0">
            
            <img src="https://images.unsplash.com/photo-1628527303038-f99999999999?q=80&w=1000&auto=format&fit=crop" 
                 alt="SSD 배경" 
                 class="absolute w-full h-full object-cover animate-fade-loop delay-ssd filter blur-sm opacity-0">
            
            <div class="absolute inset-0 bg-white/70"></div>
        </div>

        <div class="max-w-7xl mx-auto px-4 relative z-10 w-full">
            <div class="max-w-3xl">
                <div class="inline-flex items-center gap-2 bg-blue-50 text-blue-600 px-4 py-2 rounded-full text-sm font-bold mb-6">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-600"></span>
                    </span>
                    실시간 가격 자동 업데이트 시스템 가동 중
                </div>
                <h1 class="text-6xl md:text-8xl font-black leading-tight tracking-tighter mb-8 break-keep">
                    Smart PC<br><span class="text-blue-600">Solution.</span>
                </h1>
                <p class="text-xl text-gray-500 font-medium leading-relaxed mb-10 break-keep">
                    복잡한 견적부터 중고 매입까지 한 번에.<br>
                    가장 투명한 가격으로 당신의 PC를 완성하세요.
                </p>
                <div class="flex flex-wrap gap-4">
                    <a href="estimate.html" class="px-10 py-5 bg-gray-900 text-white rounded-2xl font-black text-lg hover:bg-blue-600 transition-all shadow-xl shadow-gray-200">
                        지금 견적 시작하기
                    </a>
                </div>
            </div>
        </div>
    </header>

    <footer class="bg-white border-t border-gray-100 pt-20 pb-10">
        </footer>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</body>
</html>
